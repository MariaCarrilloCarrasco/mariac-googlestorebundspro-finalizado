<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Fitbit Inspire 3 — health and fitness tracker with heart rate monitoring. Available in 3 colors. Shop on the Google Store." />
    <title>Google Store</title>
    <link rel="icon" type="image/png" href="../img/google-logo.png" />
    <link rel="stylesheet" href="../styles/style.css" />
    <link rel="stylesheet" href="../styles/watches_style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- ===================== NAVIGATION ===================== -->
    <nav aria-label="Main navigation">
      <div class="links_contain">
        <a href="../index.html"
          ><img src="../img/google-logo.png" alt="logo"
        /></a>

        <ul class="links">
          <li><a href="#">Phones</a></li>
          <li>
            <a href="../index.html">Earbuds</a>
          </li>
          <li>
            <a href="../pages/watches.html" aria-current="page">Watches</a>
          </li>
          <li><a href="#">Smart Home</a></li>
          <li><a href="#">Accessories</a></li>
          <li><a href="#">Subscriptions</a></li>
        </ul>
      </div>

      <ul class="icons">
        <li>
          <a href="#"><img src="../img/icons/Search.svg" alt="Search" /></a>
        </li>
        <li>
          <a href="#"><img src="../img/icons/Help.svg" alt="Help" /></a>
        </li>
        <li>
          <a href="#"><img src="../img/icons/Cart.svg" alt="Cart" /></a>
        </li>
        <li>
          <a href="#"><img src="../img/icons/Avatar.svg" alt="User account" /></a>
        </li>
        <li class="menu">
          <a href="#"><img src="../img/icons/icons-menu.svg" alt="Open menu" /></a>
        </li>
      </ul>
    </nav>

    <!-- ===================== MAIN CONTENT ===================== -->
    <main>
      <a href="#" class="btn_back">
        <img src="../img/icons/Arrow.svg" alt="arrow" />
        See product details
      </a>

      <section>
        <div>
          <figure>
            <div class="image">
              <img
                src="../img/smartwatch/smartwatch_black.png"
                alt="Fitbit Inspire 3 - Midnight Zen"
              />
            </div>
          </figure>
        </div>

        <div class="info_product">
          <div class="description">
            <h1>Fitbit Inspire 3</h1>
            <p>Health & Fitness Tracker</p>
            <p class="price_summary">99,95 €</p>
            <hr />
            <p id="color-label">Choose a Color</p>
          </div>

          <!-- Color selector and purchase actions -->
          <div class="purchase">
            <fieldset class="watch-colors" aria-labelledby="color-label">
              <input type="radio" name="color" id="color-midnight" checked />
              <label for="color-midnight" class="watch-swatch swatch-midnight">
                <img
                  src="../img/smartwatch/smartwatch_black.png"
                  alt="Midnight Zen"
                />
                <span
                  >Midnight<br />
                  Zen</span
                >
              </label>

              <input type="radio" name="color" id="color-lilac" />
              <label for="color-lilac" class="watch-swatch swatch-lilac">
                <img
                  src="../img/smartwatch/smartwatch_pink.png"
                  alt="Lilac Bliss"
                />
                <span
                  >Lilac<br />
                  Bliss</span
                >
              </label>

              <input type="radio" name="color" id="color-morning" />
              <label for="color-morning" class="watch-swatch swatch-morning">
                <img
                  src="../img/smartwatch/smartwatch_yellow.png"
                  alt="Morning Glow"
                />
                <span
                  >Morning<br />
                  Glow</span
                >
              </label>
            </fieldset>

            <div class="purchase_details">
              <p class="price_purchase">99,95 €</p>
              <hr />
              <div class="select_quantity">
                <label for="quantity" class="sr-only">Quantity</label>
                <select name="quantity" id="quantity">
                  <option value="1">1</option>
                  <option value="2">2</option>
                  <option value="3">3</option>
                  <option value="4">4</option>
                  <option value="5">5</option>
                </select>
                <button>Add to cart</button>
              </div>

              <div class="delivery">
                <img src="../img/icons/Delivery.svg" alt="Free delivery" />
                <p>Delivers 29 Apr to <span>08023</span></p>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- ===================== FOOTER ===================== -->
    <footer>
      <div>
        <!-- Social media links -->
        <div class="social-icons">
          <a href="#"><img src="../img/icons/SM-x.svg" alt="X" loading="lazy" /></a>
          <a href="#"
            ><img src="../img/icons/SM-instagram.svg" alt="Instagram" loading="lazy"
          /></a>
          <a href="#"
            ><img src="../img/icons/SM-facebook.svg" alt="Facebook" loading="lazy"
          /></a>
          <a href="#"
            ><img src="../img/icons/SM-youtube.svg" alt="YouTube" loading="lazy"
          /></a>
          <a href="#"><img src="../img/icons/SM-tiktok.svg" alt="TikTok" loading="lazy" /></a>
        </div>

        <!-- Legal links and country selector -->
        <div class="footer-links">
          <a href="#">Privacy</a>
          <a href="#">Google Nest Commitment to Privacy</a>
          <a href="#">Sales Terms</a>
          <a href="#">Terms of Service</a>
          <div class="country">
            <img src="../img/icons/Spain.svg" alt="Spain" /> Spain
          </div>
        </div>
      </div>
    </footer>
  </body>
</html>
