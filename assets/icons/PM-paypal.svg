  <text x="40" y="21" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="bold" fill="#003087">Pay</text>
  <text x="46" y="21" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="bold" fill="#009cde">Pal</text>
