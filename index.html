<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Google Store</title>
    <link rel="icon" type="image/png" href="./img/google-logo.png" />
    <link rel="stylesheet" href="./styles/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- ===================== NAVIGATION ===================== -->
    <nav aria-label="Main navigation">
      <div class="links_contain">
        <a href="#"><img src="./img/google-logo.png" alt="logo" /></a>

        <ul class="links">
          <li><a href="#">Phones</a></li>
          <li>
            <a href="../pages/earbuds.html" aria-current="page">Earbuds</a>
          </li>
          <li><a href="../pages/watches.html">Watches</a></li>
          <li><a href="#">Smart Home</a></li>
          <li><a href="#">Accessories</a></li>
          <li><a href="#">Subscriptions</a></li>
        </ul>
      </div>

      <ul class="icons">
        <li>
          <a href="#"><img src="./img/icons/Search.svg" alt="Search" /></a>
        </li>
        <li>
          <a href="#"><img src="./img/icons/Help.svg" alt="Help" /></a>
        </li>
        <li>
          <a href="#"><img src="./img/icons/Cart.svg" alt="Cart" /></a>
        </li>
        <li>
          <a href="#"
            ><img src="./img/icons/Avatar.svg" alt="User account"
          /></a>
        </li>
        <li class="menu">
          <a href="#"
            ><img src="./img/icons/icons-menu.svg" alt="Open menu"
          /></a>
        </li>
      </ul>
    </nav>

    <!-- ===================== MAIN CONTENT ===================== -->
    <main>
      <a href="#" class="btn_back">
        <img src="./img/icons/Arrow.svg" alt="arrow" />
        See product details
      </a>

      <section>
        <div>
          <figure>
            <div class="thumbnails">
              <div>
                <img
                  src="./img/earbuds/earbuds_01.png"
                  alt="Google Pixel Buds Pro - vista frontal con estuche abierto"
                />
              </div>
              <div>
                <img
                  src="./img/earbuds/earbuds_02.png"
                  alt="Google Pixel Buds Pro - vista lateral"
                />
              </div>
              <div>
                <img
                  src="./img/earbuds/earbuds_03.png"
                  alt="Google Pixel Buds Pro - auricular derecho"
                />
              </div>
              <div>
                <img
                  src="./img/earbuds/earbuds_04.png"
                  alt="Google Pixel Buds Pro - estuche cerrado"
                />
              </div>
            </div>

            <div class="image">
              <img
                src="./img/earbuds/earbuds_01.png"
                alt="Google Pixel Buds Pro - vista frontal con estuche abierto"
              />
            </div>
          </figure>
        </div>

        <div class="info_product">
          <div class="description">
            <h1>Google Pixel Buds Pro</h1>
            <p>Music & Sound</p>
            <p class="price_summary">229 €</p>
            <hr />
            <p>Choose a Color</p>
          </div>

          <!-- Color selector and purchase actions -->
          <div class="purchase">
            <div class="colors">
              <input type="radio" name="color" id="color-blue" checked />
              <label for="color-blue" class="color-swatch swatch-blue"></label>

              <input type="radio" name="color" id="color-gray-light" />
              <label
                for="color-gray-light"
                class="color-swatch swatch-gray-light"
              ></label>

              <input type="radio" name="color" id="color-dark" />
              <label for="color-dark" class="color-swatch swatch-dark"></label>

              <input type="radio" name="color" id="color-gray" />
              <label for="color-gray" class="color-swatch swatch-gray"></label>

              <input type="radio" name="color" id="color-green" />
              <label
                for="color-green"
                class="color-swatch swatch-green"
              ></label>

              <input type="radio" name="color" id="color-red" />
              <label for="color-red" class="color-swatch swatch-red"></label>
            </div>

            <div class="purchase_details">
              <p class="price_purchase">229 €</p>
              <hr />
              <div>
                <select name="quantity" id="quantity">
                  <option value="1">1</option>
                  <option value="2">2</option>
                  <option value="3">3</option>
                  <option value="4">4</option>
                  <option value="5">5</option>
                </select>
                <button>Add to cart</button>
              </div>

              <div class="delivery">
                <img src="./img/icons/Delivery.svg" alt="Delivers" />
                <p>Delivers 29 Apr to <span>08023</span></p>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- ===================== FOOTER ===================== -->
    <footer>
      <div>
        <!-- Social media links -->
        <div class="social-icons">
          <a href="#"><img src="./img/icons/SM-x.svg" alt="X" /></a>
          <a href="#"
            ><img src="./img/icons/SM-instagram.svg" alt="Instagram"
          /></a>
          <a href="#"
            ><img src="./img/icons/SM-facebook.svg" alt="Facebook"
          /></a>
          <a href="#"><img src="./img/icons/SM-youtube.svg" alt="YouTube" /></a>
          <a href="#"><img src="./img/icons/SM-tiktok.svg" alt="TikTok" /></a>
        </div>

        <!-- Legal links and country selector -->
        <div class="footer-links">
          <a href="#">Privacy</a>
          <a href="#">Google Nest Commitment to Privacy</a>
          <a href="#">Sales Terms</a>
          <a href="#">Terms of Service</a>
          <div class="country">
            <img src="./img/icons/Spain.svg" alt="Spain" /> Spain
          </div>
        </div>
      </div>
    </footer>
  </body>
</html>
