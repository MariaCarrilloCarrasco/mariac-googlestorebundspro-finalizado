<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Google Store</title>
    <link rel="icon" type="image/png" href="./img/google-logo.png" />
    <link rel="stylesheet" href="./styles/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet" />
</head>

<body>
    <!-- Dentro del encabezado hay una barra de navegación con de izquierda a derecha: izqda (El logo de google + 6 enlaces) y 4 iconos a la derecha (lupa + ? + carrito + login)   -->

    <nav>
        <!-- Para no utilizar DIV para agrupar los elementos utilizo listas desordenadas y dentro listas ordenadas  -->
        <!-- Enlaces izquierda -->

        <ul class="links">
            <img src="img/google-logo.png" alt="logo" />
            <li><a href="#">Phones</a></li>
            <li><a href="#">Earbuds</a></li>
            <li><a href="./pages/watches.html">Watches</a></li>
            <li><a href="#">Smart Home</a></li>
            <li><a href="#">Accessories</a></li>
            <li><a href="#">Subscriptions</a></li>
        </ul>
        <!-- Enlaces ICONOS derecha -->
        <ul class="icons">
            <li>
                <a href="#"><img src="img/icons/Search.svg" alt="buscador" /></a>
            </li>
            <li>
                <a href="#"><img src="img/icons/Help.svg" alt="ayuda" /></a>
            </li>
            <li>
                <a href="#"> <img src="img/icons/Cart.svg" alt="carrito" /></a>
            </li>
            <li>
                <a href="#"><img src="img/icons/Avatar.svg" alt="usuario" /></a>
            </li>
            <li>
                <a href="#"><img src="img/icons/icons-menu.svg" alt="usuario" /></a>
            </li>
        </ul>
    </nav>
    <main>
        <button class="btn_back">
            <img src="../img/icons/Arrow.svg" alt="back" />
            See product details
        </button>
        <section>
            <div>
                <div class="photos">
                    <div class="thumbnails">
                        <img src="../img/earbuds/earbuds_01.png" alt="earbuds_01" />
                        <img src="../img/earbuds/earbuds_02.png" alt="earbuds_02" />
                        <img src="../img/earbuds/earbuds_03.png" alt="earbuds_03" />
                        <img src="../img/earbuds/earbuds_04.png" alt="earbuds_04" />
                    </div>
                    <div class="image">
                        <img src="../img/earbuds/earbuds_01.png" alt="earbuds_01" />
                    </div>
                </div>
            </div>
            <div class="infor_product">
                <div>
                    <h1>Google Pixel Bunds Pro</h1>
                    <p>Music & Sound</p>
                    <h2>229 €</h2>
                    <hr />
                    <p>Choose a Color</p>
                </div>
                <div>
                    <div class="colors">
                        <div></div>
                        <div></div>
                        <div></div>
                        <div></div>
                        <div></div>
                        <div></div>
                    </div>
                    <div>
                        <h1>229 €</h1>
                        <hr />
                        <div class="select">
                            <p>1</p>
                            <div></div>
                        </div>
                        <button>Add to cart</button>
                        <div class="delivery">
                            <img src="../img/icons/Delivery.svg" alt="Delivers" />
                            <p>Delivers 29 Apr to <span>08023</span></p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="social-icons">
            <a href="#"><img src="../img/icons/SM-x.svg" alt="X"></a>
            <a href="#"><img src="../img/icons/SM-instagram.svg" alt="Instagram"></a>
            <a href="#"><img src="../img/icons/SM-facebook.svg" alt="Facebook"></a>
            <a href="#"><img src="../img/icons/SM-youtube.svg" alt="YouTube"></a>
            <a href="#"><img src="../img/icons/SM-tiktok.svg" alt="TikTok"></a>
        </div>

        <div class="country">
            <img src="../img/icons/Spain.svg" alt="Spain">
            <span>Spain</span>
        </div>

        <div class="footer-links">
            <a href="#">Privacy</a>
            <a href="#">Google Nest Commitment to Privacy</a>
            <a href="#">Sales Terms</a>
            <a href="#">Terms of Service</a>
        </div>

    </footer>
</body>

</html>
